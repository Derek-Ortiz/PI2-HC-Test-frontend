services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Para certificados SSL
    depends_on:
      - frontend
    networks:
      - app-network

  frontend: 
    image: derekortiz/hc-frontend:latest
    restart: always
    expose:
      - "3000"
    env_file: .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
