# .github/workflows/deploy.yml (Frontend)
name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Login a Docker Hub (reemplaza todo lo de AWS ECR)
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build y Push a Docker Hub
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hc-frontend:latest

      # Copiar docker-compose.yml a la EC2
      - name: Copiar docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app"

      # Deploy en EC2
      - name: Deploy con Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login a Docker Hub desde la EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | \
              docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            cd /home/ubuntu/app
            docker compose pull
            docker compose up -d