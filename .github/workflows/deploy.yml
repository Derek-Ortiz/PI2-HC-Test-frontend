# .github/workflows/deploy.yml (Frontend)
name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      ## Login a Docker Hub
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build y Push a Docker Hub
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hc-frontend:latest

      # Copiar archivos de configuración a la EC2
      - name: Copiar archivos de configuración
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/home/ubuntu/app"

      # Deploy en EC2
      - name: Deploy con Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login a Docker Hub desde la EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | \
              docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            cd /home/ubuntu/app
            
            # Crear .env.production desde variables
            cat > .env.production << EOF
NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
EOF
            
            # Verificar que el archivo se creó
            echo "=== .env.production creado ==="
            cat .env.production
            
            # 1. Detener los contenedores actuales
            docker-compose -f docker-compose.prod.yml down || true
            
            # 2. Limpiar recursos viejos
            docker system prune -af --volumes
            
            # 3. Descargar la nueva imagen
            docker-compose -f docker-compose.prod.yml pull
            
            # 4. Iniciar la aplicación
            docker-compose -f docker-compose.prod.yml up -d
            
            # 5. Verificar que los contenedores estén corriendo
            sleep 5
            docker-compose -f docker-compose.prod.yml ps
            
            # 6. Mostrar logs (primeros 50 lineas)
            echo "=== Frontend Logs ===" 
            docker-compose -f docker-compose.prod.yml logs --tail=50 frontend